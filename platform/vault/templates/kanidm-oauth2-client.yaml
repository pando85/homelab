---
apiVersion: kaniop.rs/v1beta1
kind: KanidmOAuth2Client
metadata:
  name: vault
spec:
  kanidmRef:
    name: kanidm
    namespace: kanidm
  displayname: vault
  origin: https://vault.internal.grigri.cloud/
  public: true
  allowLocalhostRedirect: true
  redirectUrl:
    - http://localhost:8250/oidc/callback
    - https://vault.internal.grigri.cloud/ui/vault/auth/oidc/oidc/callback
  scopeMap:
    - group: vault-admins
      scopes:
        - openid
        - profile
        - email
  preferShortUsername: true
  strictRedirectUrl: true
  image:
    url: https://raw.githubusercontent.com/docker-library/docs/90d4d43bdfccd5cb21e5fd964d32b0074af0f357/vault/logo.svg
