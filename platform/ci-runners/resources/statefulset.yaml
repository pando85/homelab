apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ci-runner
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: ci-runner
  serviceName: ci-runner
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ci-runner
    spec:
      runtimeClassName: kata
      # source: https://docs.cilium.io/en/latest/network/kubernetes/kata/
      initContainers:
        - name: set-mtu
          # renovate: datasource=docker
          image: busybox:1.37.0
          command:
            - sh
            - -c
            - |
              GW="$(ip route show default | awk 'NR==1 {print $3}')"
              DEV="$(ip route show default | awk 'NR==1 {print $5}')"
              ip route replace default via "$GW" dev "$DEV" mtu 1450
          securityContext:
            privileged: true
            runAsUser: 0
            capabilities:
              add:
                - NET_ADMIN
      containers:
        - name: runner
          # renovate: sha256: datasource=docker
          image: ghcr.io/pando85/forgejo-runner:12.7.1
          command:
            - sh
            - -c
            - |
              while ! nc -z localhost 2376 </dev/null; do
                echo 'waiting for docker daemon...'
                sleep 5
              done

              cp /config/.runner .
              exec forgejo-runner -c /registration/registration.yaml daemon
          resources:
            requests:
              memory: "100Mi"
              cpu: "100m"
            limits:
              memory: "14Gi"
              cpu: "14"
          securityContext:
            privileged: true
            runAsUser: 1001
          env:
            - name: DOCKER_HOST
              value: tcp://localhost:2376
            - name: DOCKER_CERT_PATH
              value: /certs/client
            - name: DOCKER_TLS_VERIFY
              value: "1"
          volumeMounts:
            - name: docker-certs
              mountPath: /certs
            - name: runner-data
              mountPath: /workspace
            - name: runner-registration
              mountPath: /registration
              readOnly: false
            - name: runner-config
              mountPath: /config
              readOnly: false
            - name: ci-runner-cache
              mountPath: /cache
        - name: daemon
          image: docker:29.2.1
          command:
            - sh
            - -ec
            - |
              # POSIX sh: no [[ ]]
              if [ "$(df -PT /var/lib/docker | awk 'NR==2 {print $2}')" = "virtiofs" ]; then
                truncate -s 50G /docker/disk.img
                mkfs.ext4 -F /docker/disk.img
                mount /docker/disk.img /var/lib/docker
              fi

              dockerd-entrypoint.sh 2>&1 &
              DOCKERD_PID="$!"

              cleanup() {
                echo "stopping dockerd (pid=$DOCKERD_PID)"
                # Try graceful first
                kill -TERM "$DOCKERD_PID" 2>/dev/null || true
                # Give it a moment, then hard kill if needed
                for i in 1 2 3 4 5; do
                  kill -0 "$DOCKERD_PID" 2>/dev/null || break
                  sleep 1
                done
                kill -KILL "$DOCKERD_PID" 2>/dev/null || true
                wait "$DOCKERD_PID" 2>/dev/null || true
              }

              trap cleanup INT TERM EXIT

              # Keep running while both processes exist.
              # shareProcessNamespace: true makes pgrep see the runner container process.
              while pgrep -x forgejo-runner >/dev/null 2>&1 && kill -0 "$DOCKERD_PID" >/dev/null 2>&1; do
                echo "watching main job execution and docker daemon"
                sleep 10
              done

              echo "runner or dockerd exited -> stopping dind"
              cleanup
              exit 0
          env:
            - name: DOCKER_TLS_CERTDIR
              value: /certs
            - name: DOCKER_HOST
              value: tcp://0.0.0.0:2376
          securityContext:
            privileged: true
            runAsUser: 0
          volumeMounts:
            - name: docker-certs
              mountPath: /certs
            - name: ci-runner-docker
              mountPath: /docker
            - name: runner-data
              mountPath: /workspace
            - name: ci-runner-cache
              mountPath: /cache
          resources:
            requests:
              memory: "100Mi"
              cpu: "100m"
            limits:
              memory: "5Gi"
              cpu: "3"
      securityContext:
        privileged: true
        fsGroup: 1001
        fsGroupChangePolicy: "OnRootMismatch"
        runAsGroup: 1001
        runAsUser: 1001
      volumes:
        - name: runner-data
          emptyDir:
            medium: Memory
            sizeLimit: 3Gi
        - name: runner-config
          secret:
            secretName: runner-config
        - name: runner-registration
          configMap:
            name: runner-registration
        - name: docker-certs
          emptyDir: {}
        - name: ci-runner-cache
          persistentVolumeClaim:
            claimName: ci-runner-cache
        - name: ci-runner-docker
          persistentVolumeClaim:
            claimName: ci-runner-docker
      # not working with kata runtime
      #resources:
      #  requests:
      #    memory: "100Mi"
      #    cpu: "100m"
      #  limits:
      #    memory: "15Gi"
      #    cpu: "8"
      restartPolicy: Always
      shareProcessNamespace: true
      terminationGracePeriodSeconds: 15
      lifecycle:
        preStop:
          exec:
            command:
              - sh
              - -c
              - "pkill -TERM dockerd || true; pkill -TERM containerd || true; sleep 2"
