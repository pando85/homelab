apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ci-runner
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: ci-runner
  serviceName: ci-runner
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ci-runner
    spec:
      containers:
        - name: runner
          # renovate: sha256: datasource=docker
          image: ghcr.io/pando85/forgejo-runner:12.8.0
          command:
            - sh
            - -c
            - |
              retries=0
              max_retries=10
              while [ ! -S /sock/docker.sock ]; do
                echo "waiting for docker daemon... ($retries/$max_retries)"
                sleep 5
                retries=$((retries+1))
                if [ "$retries" -ge "$max_retries" ]; then
                  echo "docker daemon not available after $max_retries attempts, restarting container"
                  exit 1
                fi
              done

              cp /config/.runner .
              exec forgejo-runner -c /registration/registration.yaml daemon
          resources:
            requests:
              memory: "4Gi"
              cpu: "100m"
            limits:
              memory: "18Gi"
              cpu: "14"
          securityContext:
            privileged: true
            runAsUser: 1001
          env:
            - name: DOCKER_HOST
              value: unix:///sock/docker.sock
          volumeMounts:
            - name: runner-data
              mountPath: /workspace
            - name: runner-registration
              mountPath: /registration
            - name: runner-config
              mountPath: /config
            - name: ci-runner-cache
              mountPath: /cache
            - name: docker-run
              mountPath: /sock
        - name: daemon
          # renovate: datasource=docker
          image: docker:29.3.1
          env:
            - name: TINI_SUBREAPER
              value: "1"
            - name: DOCKER_TLS_CERTDIR
              value: /certs
            - name: DOCKER_HOST
              value: tcp://0.0.0.0:2376
          command:
            - sh
            - -c
            - |
              exec /usr/local/bin/docker-init -- sh -c '
                cleanup() {
                  echo "Received termination signal, stopping docker daemon..."
                  pkill -TERM dockerd 2>/dev/null || true
                  pkill -TERM containerd 2>/dev/null || true
                  sleep 2
                  exit 0
                }

                trap cleanup TERM INT

                dockerd-entrypoint.sh --host=unix:///sock/docker.sock --host=tcp://0.0.0.0:2376 2>&1 &
                  DOCKERD_PID=$!

                  while [ ! -S /sock/docker.sock ]; do
                    sleep 1
                  done

                  chgrp 1001 /sock/docker.sock
                  chmod 660 /sock/docker.sock

                  RUNNER_STARTED=false
                  while kill -0 $DOCKERD_PID 2>/dev/null; do
                    if pgrep forgejo-runner > /dev/null; then
                      RUNNER_STARTED=true
                    elif [ "$RUNNER_STARTED" = true ]; then
                      echo "forgejo-runner exited, stopping dind"
                      break
                    fi
                    sleep 5
                  done

                  cleanup
              '
          securityContext:
            privileged: true
            runAsUser: 0
          volumeMounts:
            - name: docker-certs
              mountPath: /certs
            - name: ci-runner-docker
              mountPath: /var/lib/docker
            - name: runner-data
              mountPath: /workspace
            - name: ci-runner-cache
              mountPath: /cache
            - name: docker-run
              mountPath: /sock
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "8Gi"
              cpu: "4"
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - test -S /sock/docker.sock
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 36
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pgrep dockerd >/dev/null
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - test -S /sock/docker.sock
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 5
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - "pkill -TERM dockerd 2>/dev/null || true; sleep 2"
        - name: docker-gc
          # renovate: datasource=docker
          image: docker:29.3.1
          env:
            - name: HOME
              value: /tmp
            - name: DOCKER_HOST
              value: unix:///sock/docker.sock
          command:
            - sh
            - -c
            - |
              CHECK_INTERVAL=1800
              THRESHOLD_LOW=80
              THRESHOLD_MED=85
              THRESHOLD_HIGH=90
              THRESHOLD_CRITICAL=95
              runner_started=false

              cleanup() {
                exit 0
              }

              trap cleanup TERM INT

              get_disk_usage() {
                df -P /var/lib/docker 2>/dev/null | awk 'NR==2 {print $5}' | tr -d '%' || echo 0
              }

              while true; do
                if pgrep forgejo-runner >/dev/null; then
                  runner_started=true
                elif [ "$runner_started" = true ]; then
                  echo "forgejo-runner exited, stopping docker-gc"
                  exit 0
                fi

                until docker info >/dev/null 2>&1; do
                  if [ "$runner_started" = true ] && ! pgrep forgejo-runner >/dev/null; then
                    echo "forgejo-runner exited, stopping docker-gc"
                    exit 0
                  fi

                  echo "waiting for docker daemon..."
                  sleep 10
                done

                usage=$(get_disk_usage)
                echo "docker disk usage: ${usage}%"

                if [ "$usage" -ge "$THRESHOLD_LOW" ]; then
                  if [ "$usage" -ge "$THRESHOLD_CRITICAL" ]; then
                    echo "critical disk usage (${usage}%), aggressive cleanup (6h retention)"
                    docker image prune -af --filter "until=6h" || true
                    docker builder prune -af --filter "until=6h" || true
                    docker container prune -f || true
                  elif [ "$usage" -ge "$THRESHOLD_HIGH" ]; then
                    echo "high disk usage (${usage}%), pruning unused images (24h retention)"
                    docker image prune -af --filter "until=24h" || true
                    docker builder prune -af --filter "until=24h" || true
                  elif [ "$usage" -ge "$THRESHOLD_MED" ]; then
                    echo "medium disk usage (${usage}%), pruning build cache (24h retention)"
                    docker builder prune -af --filter "until=24h" || true
                  else
                    echo "low disk usage (${usage}%), pruning dangling images and containers"
                    docker image prune -f || true
                    docker container prune -f || true
                  fi

                  new_usage=$(get_disk_usage)
                  echo "cleanup complete, new usage: ${new_usage}%"
                else
                  echo "disk usage below threshold (${usage}%), skipping cleanup"
                fi

                echo "sleeping for ${CHECK_INTERVAL}s"
                slept_seconds=0
                while [ "$slept_seconds" -lt "$CHECK_INTERVAL" ]; do
                  if ! pgrep forgejo-runner >/dev/null; then
                    echo "forgejo-runner exited, stopping docker-gc"
                    exit 0
                  fi

                  sleep 10
                  slept_seconds=$((slept_seconds + 10))
                done
              done
          volumeMounts:
            - name: docker-run
              mountPath: /sock
            - name: ci-runner-docker
              mountPath: /var/lib/docker
              readOnly: true
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "128Mi"
              cpu: "100m"
        - name: workspace-gc
          image: busybox:1.37.0
          command:
            - sh
            - /scripts/cleanup.sh
          volumeMounts:
            - name: runner-data
              mountPath: /workspace
            - name: workspace-gc-script
              mountPath: /scripts
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "50m"

      securityContext:
        fsGroupChangePolicy: "OnRootMismatch"
        supplementalGroups:
          - 1001
        runAsGroup: 1001
        runAsUser: 1001
      volumes:
        - name: runner-data
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi
        - name: runner-config
          secret:
            secretName: runner-config
        - name: runner-registration
          configMap:
            name: runner-registration
        - name: docker-certs
          emptyDir: {}
        - name: docker-run
          emptyDir: {}
        - name: ci-runner-cache
          persistentVolumeClaim:
            claimName: ci-runner-cache
        - name: ci-runner-docker
          persistentVolumeClaim:
            claimName: ci-runner-docker
        - name: workspace-gc-script
          configMap:
            name: workspace-gc-script
      # not working with kata runtime
      # resources:
      #   requests:
      #     memory: "100Mi"
      #     cpu: "100m"
      #   limits:
      #     memory: "15Gi"
      #     cpu: "8"
      restartPolicy: Always
      shareProcessNamespace: true
      terminationGracePeriodSeconds: 30
