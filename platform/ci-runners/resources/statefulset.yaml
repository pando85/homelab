apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ci-runner
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: ci-runner
  serviceName: ci-runner
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ci-runner
    spec:
      runtimeClassName: kata
      # source: https://docs.cilium.io/en/latest/network/kubernetes/kata/
      initContainers:
        - name: set-mtu
          # renovate: datasource=docker
          image: busybox:1.37.0
          command:
            - sh
            - -c
            - |
              GW="$(ip route show default | awk 'NR==1 {print $3}')"
              DEV="$(ip route show default | awk 'NR==1 {print $5}')"
              ip route replace default via "$GW" dev "$DEV" mtu 1450
          securityContext:
            privileged: true
            runAsUser: 0
            capabilities:
              add:
                - NET_ADMIN
      containers:
        - name: runner
          # renovate: sha256: datasource=docker
          image: ghcr.io/pando85/forgejo-runner:12.7.3
          command:
            - sh
            - -c
            - |
              retries=0
              max_retries=10
              while [ ! -S /sock/docker.sock ]; do
                echo "waiting for docker daemon... ($retries/$max_retries)"
                sleep 5
                retries=$((retries+1))
                if [ "$retries" -ge "$max_retries" ]; then
                  echo "docker daemon not available after $max_retries attempts, restarting container"
                  exit 1
                fi
              done

              cp /config/.runner .
              exec forgejo-runner -c /registration/registration.yaml daemon
          resources:
            requests:
              memory: "100Mi"
              cpu: "100m"
            limits:
              memory: "14Gi"
              cpu: "14"
          securityContext:
            privileged: true
            runAsUser: 1001
          env:
            - name: DOCKER_HOST
              value: unix:///sock/docker.sock
          volumeMounts:
            - name: runner-data
              mountPath: /workspace
            - name: runner-registration
              mountPath: /registration
            - name: runner-config
              mountPath: /config
            - name: ci-runner-cache
              mountPath: /cache
            - name: docker-run
              mountPath: /sock
        - name: daemon
          # renovate: datasource=docker
          image: docker:29.3.1
          env:
            - name: TINI_SUBREAPER
              value: "1"
            - name: DOCKER_TLS_CERTDIR
              value: /certs
            - name: DOCKER_HOST
              value: tcp://0.0.0.0:2376
          command:
            - sh
            - -c
            - |
              exec /usr/local/bin/docker-init -- sh -c '
                cleanup() {
                  echo "Received termination signal, stopping docker daemon..."
                  pkill -TERM dockerd 2>/dev/null || true
                  pkill -TERM containerd 2>/dev/null || true
                  sleep 2
                  exit 0
                }

                trap cleanup TERM INT

                if [[ $(df -PT /var/lib/docker | awk "NR==2 {print \$2}") == virtiofs ]]; then
                  if [[ ! -f /docker/disk.img ]]; then
                    truncate -s 50G /docker/disk.img &&
                    mkfs.ext4 /docker/disk.img
                  fi &&
                  mount /docker/disk.img /var/lib/docker
                fi &&

                dockerd-entrypoint.sh --host=unix:///sock/docker.sock --host=tcp://0.0.0.0:2376 2>&1 &
                  DOCKERD_PID=$!

                  RUNNER_STARTED=false
                  while kill -0 $DOCKERD_PID 2>/dev/null; do
                    if pgrep forgejo-runner > /dev/null; then
                      RUNNER_STARTED=true
                    elif [ "$RUNNER_STARTED" = true ]; then
                      echo "forgejo-runner exited, stopping dind"
                      break
                    fi
                    sleep 5
                  done

                  cleanup
              '
          securityContext:
            privileged: true
            runAsUser: 0
          volumeMounts:
            - name: docker-certs
              mountPath: /certs
            - name: ci-runner-docker
              mountPath: /docker
            - name: runner-data
              mountPath: /workspace
            - name: ci-runner-cache
              mountPath: /cache
            - name: docker-run
              mountPath: /sock
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "6Gi"
              cpu: "4"
          livenessProbe:
            tcpSocket:
              port: 2376
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 2376
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - "pkill -TERM dockerd 2>/dev/null || true; sleep 2"
        - name: docker-gc
          # renovate: datasource=docker
          image: docker:29.3.1
          env:
            - name: HOME
              value: /tmp
            - name: DOCKER_HOST
              value: unix:///sock/docker.sock
          command:
            - sh
            - -c
            - |
              interval_seconds=$((12 * 60 * 60))
              retention=72h

              while true; do
                until docker info >/dev/null 2>&1; do
                  echo "waiting for docker daemon..."
                  sleep 10
                done

                echo "pruning docker images older than ${retention}"
                docker image prune -af --filter "until=${retention}" || true

                echo "pruning docker build cache older than ${retention}"
                docker builder prune -af --filter "until=${retention}" || true

                echo "sleeping for ${interval_seconds}s"
                sleep "${interval_seconds}"
              done
          volumeMounts:
            - name: docker-run
              mountPath: /sock
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "128Mi"
              cpu: "100m"

      securityContext:
        fsGroup: 1001
        fsGroupChangePolicy: "OnRootMismatch"
        runAsGroup: 1001
        runAsUser: 1001
      volumes:
        - name: runner-data
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi
        - name: runner-config
          secret:
            secretName: runner-config
        - name: runner-registration
          configMap:
            name: runner-registration
        - name: docker-certs
          emptyDir: {}
        - name: docker-run
          emptyDir: {}
        - name: ci-runner-cache
          persistentVolumeClaim:
            claimName: ci-runner-cache
        - name: ci-runner-docker
          persistentVolumeClaim:
            claimName: ci-runner-docker
      # not working with kata runtime
      # resources:
      #   requests:
      #     memory: "100Mi"
      #     cpu: "100m"
      #   limits:
      #     memory: "15Gi"
      #     cpu: "8"
      restartPolicy: Always
      shareProcessNamespace: true
      terminationGracePeriodSeconds: 30
