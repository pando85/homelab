apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-repo-creds-helm-tea-millaguie-net
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: argocd-repo-creds-helm-tea-millaguie-net
    template:
      engineVersion: v2
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        url: tea.millaguie.net
        type: helm
        enableOCI: "true"
        username: {{`"{{ .username }}"`}}
        password: {{`"{{ .password }}"`}}

  data:
    - secretKey: username
      remoteRef:
        key: /argocd/helm-tea-millaguie-net
        property: username
    - secretKey: password
      remoteRef:
        key: /argocd/helm-tea-millaguie-net
        property: password
