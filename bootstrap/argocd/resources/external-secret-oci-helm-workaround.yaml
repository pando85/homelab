apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-repo-creds-helm-git-grigri-cloud-workaround
  annotations:
    # Mounted into the repo-server at /helm-working-dir/registry/config.json
    # (see argocd/values.yaml: repoServer.volumes helm-auth). With
    # HELM_CONFIG_HOME=/helm-working-dir, helm reads OCI registry creds from
    # that file, so it must carry an `auths` entry for EVERY OCI registry that
    # kustomize pulls Helm charts from (git.grigri.cloud + tea.millaguie.net).
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: argocd-repo-creds-helm-git-grigri-cloud-workaround
    template:
      engineVersion: v2
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        config.json: |
            {
                "auths": {
                    "git.grigri.cloud": {
                        "auth": "{{ printf "%s:%s" .grigri_username .grigri_password | b64enc }}"
                    },
                    "tea.millaguie.net": {
                        "auth": "{{ printf "%s:%s" .tea_username .tea_password | b64enc }}"
                    }
                }
            }

  data:
    - secretKey: grigri_username
      remoteRef:
        key: /argocd/helm-git-grigri-cloud
        property: username
    - secretKey: grigri_password
      remoteRef:
        key: /argocd/helm-git-grigri-cloud
        property: password
    - secretKey: tea_username
      remoteRef:
        key: /argocd/helm-tea-millaguie-net
        property: username
    - secretKey: tea_password
      remoteRef:
        key: /argocd/helm-tea-millaguie-net
        property: password
