apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-repo-creds-helm-tea-millaguie-net-workaround
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: argocd-repo-creds-helm-tea-millaguie-net-workaround
    template:
      engineVersion: v2
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        config.json: |
            {
                "auths": {
                    "tea.millaguie.net": {
                        "auth": "{{ printf "%s:%s" .username .password | b64enc }}"
                    }
                }
            }

  data:
    - secretKey: username
      remoteRef:
        key: /argocd/helm-tea-millaguie-net
        property: username
    - secretKey: password
      remoteRef:
        key: /argocd/helm-tea-millaguie-net
        property: password
