app-template:
  controllers:
    tc-limiter:
      type: daemonset
      strategy: RollingUpdate
      containers:
        tc-limiter:
          image:
            # renovate: datasource=docker depName=golang
            repository: golang
            tag: "1.24-alpine"
          command: ["/bin/sh", "-c"]
          # The controller source lives in files/main.go (injected via the
          # tc-limiter-source ConfigMap) and is compiled at container start.
          # Stdlib-only -> fast build, no module download, multi-arch via the
          # golang image (runs on amd64 + arm64 nodes).
          args:
            - |
              set -eu
              export GOCACHE=/tmp/gocache
              echo "tc-limiter: installing iproute2 and building controller..."
              apk add --no-cache iproute2 >/dev/null
              go build -trimpath -o /tmp/tc-limiter /src/main.go
              exec /tmp/tc-limiter
          env:
            TARGET_POD_SELECTOR: "cross-backups-minio"
            RATE_LIMIT: "100mbit"
            CHECK_INTERVAL: "10s"
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - SYS_ADMIN
          resources:
            requests:
              cpu: 50m
              # Sized to the at-startup Go compile peak (~200Mi), not steady state
              # (~26Mi): every pod restart recompiles, so reserve room for it. No
              # memory limit so a larger compile can never be OOMkilled.
              memory: 256Mi

  defaultPodOptions:
    hostNetwork: true
    hostPID: true
    securityContext:
      runAsUser: 0
      runAsGroup: 0
    nodeSelector:
      kubernetes.io/hostname: prusik

  persistence:
    source:
      type: configMap
      name: tc-limiter-source
      globalMounts:
        - path: /src
    cilium-socket:
      type: hostPath
      hostPath: /var/run/cilium
      globalMounts:
        - path: /var/run/cilium
          mountPropagation: HostToContainer
    cni-netns:
      type: hostPath
      hostPath: /var/run/netns
      globalMounts:
        - path: /var/run/netns
          mountPropagation: HostToContainer
