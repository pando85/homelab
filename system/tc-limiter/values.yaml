app-template:
  controllers:
    tc-limiter:
      type: daemonset
      strategy: RollingUpdate
      containers:
        tc-limiter:
          image:
            repository: alpine
            tag: "3.23"
          command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache curl jq iproute2 > /dev/null 2>&1
              echo "tc-limiter started: watching for ${TARGET_POD_SELECTOR} at ${RATE_LIMIT}"
              while true; do
                ENDPOINT_JSON=$(curl -sf --unix-socket /var/run/cilium/cilium.sock \
                  'http://localhost/v1/endpoint' 2>/dev/null)
                if [ -n "$ENDPOINT_JSON" ]; then
                  POD_IP=$(echo "$ENDPOINT_JSON" | jq -r \
                    ".[] | select(.status[\"external-identifiers\"][\"k8s-pod-name\"] // \"\" | contains(\"${TARGET_POD_SELECTOR}\")) | .status.networking.addressing[0].ipv4 // \"\"" \
                    2>/dev/null | head -1)
                  if [ -n "$POD_IP" ]; then
                    for NS in /var/run/netns/cni-*; do
                      NS_NAME=$(basename "$NS")
                      ADDR=$(ip netns exec "$NS_NAME" ip -o addr show eth0 2>/dev/null | awk '/inet /{print $4}' | cut -d/ -f1)
                      if [ "$ADDR" = "$POD_IP" ]; then
                        CURRENT=$(ip netns exec "$NS_NAME" tc filter show dev eth0 ingress 2>/dev/null | grep police)
                        if [ -z "$CURRENT" ]; then
                          echo "$(date): Applying ${RATE_LIMIT} rate limit in netns ${NS_NAME} for pod IP ${POD_IP}"
                          ip netns exec "$NS_NAME" tc qdisc add dev eth0 clsact 2>/dev/null
                          ip netns exec "$NS_NAME" tc filter add dev eth0 ingress matchall \
                            action police rate "${RATE_LIMIT}" burst 1540 conform-exceed drop 2>&1
                        fi
                        break
                      fi
                    done
                  fi
                fi
                sleep "${CHECK_INTERVAL}"
              done
          env:
            TARGET_POD_SELECTOR: "cross-backups-minio"
            RATE_LIMIT: "100mbit"
            CHECK_INTERVAL: "10"
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - SYS_ADMIN
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi

  defaultPodOptions:
    hostNetwork: true
    hostPID: true
    securityContext:
      runAsUser: 0
      runAsGroup: 0
    nodeSelector:
      kubernetes.io/hostname: prusik

  persistence:
    cilium-socket:
      type: hostPath
      hostPath: /var/run/cilium
      globalMounts:
        - path: /var/run/cilium
          mountPropagation: HostToContainer
    cni-netns:
      type: hostPath
      hostPath: /var/run/netns
      globalMounts:
        - path: /var/run/netns
          mountPropagation: HostToContainer
