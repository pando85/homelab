apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: gpu-operator

resources:
  - time-slicing-config.yaml

helmCharts:
  - name: gpu-operator
    repo: https://helm.ngc.nvidia.com/nvidia
    version: v26.3.3
    releaseName: gpu-operator
    namespace: gpu-operator
    includeCRDs: true
    valuesFile: values.yaml
