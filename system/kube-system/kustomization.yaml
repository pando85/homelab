apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kube-system

resources:
  - resources/cilium/bgp-cluster-config.yaml
  - resources/cilium/bgp-peer-config.yaml
  - resources/cilium/bgp-advertisement.yaml
  - resources/cilium/load-balancer-ip-pool.yaml
  - resources/nodelocaldns/cilium-local-redirect-policy.yaml
  - resources/nodelocaldns/configmap.yaml
  - resources/nodelocaldns/daemonset.yaml
  - resources/nodelocaldns/service.yaml
  - resources/nodelocaldns/serviceaccount.yaml
  - resources/priority-class-high.yaml
  - resources/runtime-class-gvisor.yaml
  - resources/runtime-class-nvidia.yaml

helmCharts:
  - includeCRDs: true
    name: cilium
    namespace: kube-system
    releaseName: cilium
    repo: https://helm.cilium.io/
    valuesFile: cilium-values.yaml
    version: 1.19.4
  - includeCRDs: true
    name: kata-deploy
    namespace: kube-system
    releaseName: kata-deploy
    repo: oci://ghcr.io/kata-containers/kata-deploy-charts
    valuesFile: kata-deploy-values.yaml
    version: 3.31.0

patches:
  - patch: |-
      - op: add
        path: "/metadata/annotations/argocd.argoproj.io~1sync-options"
        value: "Replace=true"
    target:
      kind: ConfigMap
      name: cilium-dashboard
      version: v1
