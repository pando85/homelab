apiVersion: v1
kind: ConfigMap
metadata:
  name: kata-nvidia-coordinator-script
  namespace: kube-system
data:
  controller.sh: |
    #!/bin/sh

    NAMESPACE=kube-system
    KATA_DS=kata-deploy
    NVIDIA_DS=kube-system-nvidia-device-plugin
    DEBOUNCE_SECONDS=60

    get_kata_generation() {
      kubectl get ds "$KATA_DS" -n "$NAMESPACE" -o jsonpath='{.metadata.generation}'
    }

    wait_for_kata_ready() {
      kubectl rollout status ds/"$KATA_DS" -n "$NAMESPACE" --timeout=300s
    }

    restart_nvidia() {
      echo "$(date): Restarting nvidia-device-plugin..."
      kubectl rollout restart ds/"$NVIDIA_DS" -n "$NAMESPACE"
      kubectl rollout status ds/"$NVIDIA_DS" -n "$NAMESPACE" --timeout=120s
      echo "$(date): Done!"
    }

    LAST_GENERATION=""
    echo "$(date): Starting kata-nvidia coordinator..."

    while true; do
      CURRENT_GENERATION=$(get_kata_generation)

      if [ -n "$LAST_GENERATION" ] && [ "$CURRENT_GENERATION" != "$LAST_GENERATION" ]; then
        echo "$(date): kata-deploy generation changed: $LAST_GENERATION -> $CURRENT_GENERATION"
        wait_for_kata_ready
        echo "$(date): Waiting $DEBOUNCE_SECONDS seconds for stability..."
        sleep "$DEBOUNCE_SECONDS"
        restart_nvidia
      fi

      LAST_GENERATION=$CURRENT_GENERATION
      sleep 10
    done
