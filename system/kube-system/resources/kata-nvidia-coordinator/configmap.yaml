apiVersion: v1
kind: ConfigMap
metadata:
  name: kata-nvidia-coordinator-script
  namespace: kube-system
data:
  controller.sh: |
    #!/bin/sh

    NAMESPACE=kube-system
    KATA_DS=kata-deploy
    NVIDIA_DS=kube-system-nvidia-device-plugin
    DEBOUNCE_SECONDS=60

    get_pod_states() {
      kubectl get pods -l app=kata-deploy -n "$NAMESPACE" -o jsonpath='{range .items[*]}{.metadata.name}:{.metadata.creationTimestamp}:{.status.containerStatuses[0].restartCount} {end}'
    }

    wait_for_kata_ready() {
      echo "$(date): Waiting for kata-deploy to be ready..."
      kubectl rollout status ds/"$KATA_DS" -n "$NAMESPACE" --timeout=300s
    }

    restart_nvidia() {
      echo "$(date): Restarting nvidia-device-plugin..."
      kubectl rollout restart ds/"$NVIDIA_DS" -n "$NAMESPACE"
      kubectl rollout status ds/"$NVIDIA_DS" -n "$NAMESPACE" --timeout=120s
      echo "$(date): Done!"
    }

    echo "$(date): Starting kata-nvidia coordinator..."
    LAST_STATE=$(get_pod_states)
    echo "$(date): Initial kata-deploy pod state: $LAST_STATE"

    while true; do
      CURRENT_STATE=$(get_pod_states)

      if [ "$CURRENT_STATE" != "$LAST_STATE" ]; then
        echo "$(date): kata-deploy pod state changed"
        echo "$(date): Old: $LAST_STATE"
        echo "$(date): New: $CURRENT_STATE"
        wait_for_kata_ready
        echo "$(date): Waiting $DEBOUNCE_SECONDS seconds for stability..."
        sleep "$DEBOUNCE_SECONDS"
        restart_nvidia
        LAST_STATE=$(get_pod_states)
      fi

      sleep 10
    done
