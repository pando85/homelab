apiVersion: apps/v1
kind: DaemonSet
metadata:
  labels:
    k8s-app: node-local-dns
  name: nodelocaldns
spec:
  updateStrategy:
    rollingUpdate:
      maxUnavailable: 10%
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      k8s-app: node-local-dns
  template:
    metadata:
      labels:
        k8s-app: node-local-dns
      annotations:
        policy.cilium.io/no-track-port: "53"
        prometheus.io/port: "9253"
        prometheus.io/scrape: "true"
    spec:
      serviceAccountName: node-local-dns
      containers:
        - name: corefile-watcher
          # renovate: datasource=docker
          image: alpine:3.22
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
          command:
            - sh
            - -c
            - |
              apk add --no-cache curl > /dev/null 2>&1
              TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              CURRENT=""
              while true; do
                IPS=$(curl -sf \
                  --cacert /var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
                  -H "Authorization: Bearer ${TOKEN}" \
                  "https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT}/api/v1/namespaces/kube-system/endpoints/kube-dns-upstream" \
                  | grep -oE '"ip":\s*"[^"]*"' | grep -oE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' | tr '\n' ' ' \
                  || true)
                if [ -n "${IPS}" ] && [ "${IPS}" != "${CURRENT}" ]; then
                  echo "$(date): upstream endpoints changed to: ${IPS}"
                  sed "s|UPSTREAM_DNS_SERVERS|${IPS}|g" /etc/coredns-template/Corefile.template > /etc/coredns/Corefile
                  CURRENT="${IPS}"
                elif [ -z "${IPS}" ] && [ -z "${CURRENT}" ]; then
                  echo "$(date): waiting for upstream endpoints..."
                fi
                sleep 30
              done
          volumeMounts:
            - name: template-volume
              mountPath: /etc/coredns-template
              readOnly: true
            - name: corefile
              mountPath: /etc/coredns
        - name: node-cache
          args:
            - -localip
            - "0.0.0.0"
            - -conf
            - /etc/coredns/Corefile
            - -skipteardown=true
            - -setupinterface=false
            - -setupiptables=false
          # renovate: datasource=docker
          image: registry.k8s.io/dns/k8s-dns-node-cache:1.26.8
          imagePullPolicy: IfNotPresent
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            timeoutSeconds: 5
          ports:
            - containerPort: 53
              name: dns
              protocol: UDP
            - containerPort: 53
              name: dns-tcp
              protocol: TCP
            - containerPort: 9253
              hostPort: 9253
              name: metrics
              protocol: TCP
          readinessProbe:
            failureThreshold: 10
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            successThreshold: 1
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 25m
              memory: 5Mi
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - name: corefile
              mountPath: /etc/coredns
      dnsPolicy: Default
      nodeSelector:
        kubernetes.io/os: linux
      priorityClassName: system-node-critical
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 0
      tolerations:
        - effect: NoSchedule
          operator: Exists
        - effect: NoExecute
          operator: Exists
      volumes:
        - name: template-volume
          configMap:
            defaultMode: 420
            items:
              - key: Corefile.template
                path: Corefile.template
            name: nodelocaldns
        - name: corefile
          emptyDir: {}
