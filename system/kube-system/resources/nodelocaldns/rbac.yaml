apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: node-local-dns
rules:
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["list", "watch", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: node-local-dns
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: node-local-dns
subjects:
  - kind: ServiceAccount
    name: node-local-dns
    namespace: kube-system
