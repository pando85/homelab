apiVersion: v1
kind: Service
metadata:
  name: kube-dns-upstream
  labels:
    k8s-app: kube-dns
spec:
  clusterIP: None
  ports:
    - name: dns
      port: 53
      protocol: UDP
      targetPort: 53
    - name: dns-tcp
      port: 53
      protocol: TCP
      targetPort: 53
  selector:
    k8s-app: kube-dns
