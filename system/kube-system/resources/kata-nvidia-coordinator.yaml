apiVersion: batch/v1
kind: Job
metadata:
  name: kata-nvidia-coordinator
  namespace: kube-system
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      serviceAccountName: kata-deploy-sa
      restartPolicy: OnFailure
      containers:
        - name: restart-nvidia
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Waiting for kata-deploy to be ready..."
              kubectl rollout status ds/kata-deploy -n kube-system --timeout=300s
              echo "Restarting nvidia device plugin..."
              kubectl rollout restart ds/kube-system-nvidia-device-plugin -n kube-system
              kubectl rollout status ds/kube-system-nvidia-device-plugin -n kube-system --timeout=120s
              echo "Done!"
