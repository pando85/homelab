- alert: IngressNginxExternalHighErrorRate
  expr: |
    (
      sum by (host) (rate(nginx_ingress_controller_requests{controller_class="k8s.io/ingress-nginx-external",status=~"5.."}[5m]))
      /
      sum by (host) (rate(nginx_ingress_controller_requests{controller_class="k8s.io/ingress-nginx-external"}[5m]))
    ) > 0.05
    and
    sum by (host) (rate(nginx_ingress_controller_requests{controller_class="k8s.io/ingress-nginx-external"}[5m])) > 1
  for: 2m
  labels:
    severity: warning
  annotations:
    summary: "High 5xx error rate on {{ $labels.host }}"
    description: "More than 5% of requests to {{ $labels.host }} are returning 5xx errors."

- alert: IngressNginxExternalCriticalErrorRate
  expr: |
    (
      sum by (host) (rate(nginx_ingress_controller_requests{controller_class="k8s.io/ingress-nginx-external",status=~"5.."}[5m]))
      /
      sum by (host) (rate(nginx_ingress_controller_requests{controller_class="k8s.io/ingress-nginx-external"}[5m]))
    ) > 0.25
    and
    sum by (host) (rate(nginx_ingress_controller_requests{controller_class="k8s.io/ingress-nginx-external"}[5m])) > 1
  for: 2m
  labels:
    severity: critical
  annotations:
    summary: "Critical 5xx error rate on {{ $labels.host }}"
    description: "More than 25% of requests to {{ $labels.host }} are returning 5xx errors."

- alert: IngressNginxExternalHighLatency
  expr: |
    histogram_quantile(0.95,
      sum(rate(nginx_ingress_controller_request_duration_seconds_bucket{controller_class="k8s.io/ingress-nginx-external"}[5m])) by (host, le)
    ) > 5
    and
    sum by (host) (rate(nginx_ingress_controller_request_duration_seconds_count{controller_class="k8s.io/ingress-nginx-external"}[5m])) > 1
    unless on (host)
    nginx_ingress_controller_request_duration_seconds_count{host="cross-backups.grigri.cloud"}
  for: 5m
  labels:
    severity: warning
  annotations:
    summary: "High latency on {{ $labels.host }}"
    description: "p95 request latency for {{ $labels.host }} is above 5 seconds."
