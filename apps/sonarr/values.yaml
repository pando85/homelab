app-template:
  controllers:
    sonarr:
      labels:
        backup/retain: quaterly
      type: statefulset
      containers:
        sonarr:
          image:
            repository: ghcr.io/home-operations/sonarr
            tag: 4.0.17.2967@sha256:4ff5667a371e08b098858fa2457a99a5fef5f6a32640eb8567efe979d13ac9fc

          env:
            TZ: Europe/Madrid
            SONARR__POSTGRES__HOST: sonarr-postgres
            SONARR__POSTGRES__PORT: "5432"
            SONARR__POSTGRES__MAINDB: sonarr-main
            SONARR__POSTGRES__LOGDB: sonarr-log
            SONARR__POSTGRES__USER:
              valueFrom:
                secretKeyRef:
                  name: sonarr.sonarr-postgres.credentials.postgresql.acid.zalan.do
                  key: username
            SONARR__POSTGRES__PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: sonarr.sonarr-postgres.credentials.postgresql.acid.zalan.do
                  key: password

          resources:
            requests:
              cpu: 150m
              memory: 170Mi
            limits:
              memory: 1Gi

          probes:
            liveness: &probe
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /ping
                  port: &port 8989
            readiness: *probe
            startup:
              enabled: true
              spec:
                failureThreshold: 60
                periodSeconds: 10
  service:
    sonarr:
      controller: sonarr
      ports:
        http:
          port: *port

  ingress:
    sonarr:
      enabled: true
      className: nginx-internal
      annotations:
        external-dns.alpha.kubernetes.io/enabled: "true"
        cert-manager.io/cluster-issuer: letsencrypt-prod-dns
      hosts:
        - host: &host sonarr.internal.grigri.cloud
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: sonarr
                port: http
      tls:
        - hosts:
            - *host
          secretName: sonarr-tls-certificate

    external:
      enabled: true
      className: nginx-external
      annotations:
        external-dns.alpha.kubernetes.io/enabled: "true"
        external-dns.alpha.kubernetes.io/target: grigri.cloud
        cert-manager.io/cluster-issuer: letsencrypt-prod-dns
        nginx.ingress.kubernetes.io/auth-url: https://auth.grigri.cloud/oauth2/auth?allowed_groups=sonarr-users@idm.grigri.cloud
        nginx.ingress.kubernetes.io/auth-signin: https://auth.grigri.cloud/oauth2/start
        nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
      hosts:
        - host: &host sonarr.grigri.cloud
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: sonarr
                port: http
      tls:
        - hosts:
            - *host
          secretName: sonarr-external-tls-certificate
  defaultPodOptions:
    securityContext:
      runAsUser: 995
      runAsGroup: 501
      fsGroup: 501
      fsGroupChangePolicy: "OnRootMismatch"

    nodeSelector:
      kubernetes.io/hostname: prusik

  persistence:
    config:
      enabled: true
      globalMounts:
        - path: /config
      existingClaim: config-sonarr
    series:
      enabled: true
      type: hostPath
      hostPath: /datasets/series
      globalMounts:
        - path: /datasets/series
