apiVersion: v1
kind: ServiceAccount
metadata:
  name: hermes-agent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hermes-agent-radarr
  namespace: radarr
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/exec"]
    verbs: ["get", "list", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hermes-agent-radarr
  namespace: radarr
subjects:
  - kind: ServiceAccount
    name: hermes-agent
    namespace: hermes
roleRef:
  kind: Role
  name: hermes-agent-radarr
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hermes-agent-jellyfin
  namespace: jellyfin
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/exec"]
    verbs: ["get", "list", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hermes-agent-jellyfin
  namespace: jellyfin
subjects:
  - kind: ServiceAccount
    name: hermes-agent
    namespace: hermes
roleRef:
  kind: Role
  name: hermes-agent-jellyfin
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hermes-agent-navidrome
  namespace: navidrome
rules:
  # Encontrar el pod por label
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  # Ejecutar comandos (sqlite3, mkdir, rm, kill -USR1)
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  # Copiar playlists al pod
  - apiGroups: [""]
    resources: ["pods/portforward"]
    verbs: ["create"]
  # Ver secrets (Last.fm API, Spotify, etc.) - opcional
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hermes-agent-navidrome
  namespace: navidrome
subjects:
  - kind: ServiceAccount
    name: hermes-agent
    namespace: hermes
roleRef:
  kind: Role
  name: hermes-agent-navidrome
  apiGroup: rbac.authorization.k8s.io