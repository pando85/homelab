app-template:
  controllers:
    hermes:
      labels:
        backup/retain: quaterly
      type: statefulset
      pod:
        enableServiceLinks: false
        runtimeClassName: kata
        automountServiceAccountToken: true
      serviceAccount:
        name: hermes-agent
      containers:
        hermes:
          image:
            # renovate: datasource=docker depName=nousresearch/hermes-agent
            repository: nousresearch/hermes-agent
            tag: v2026.5.29.2
          args: ["gateway", "run"]
          securityContext:
            runAsUser: 10000
            runAsGroup: 10000
          env:
            TZ: Europe/Madrid
            HERMES_DASHBOARD: "1"
            HERMES_DASHBOARD_INSECURE: "1"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "8"
              memory: 4Gi
  defaultPodOptions:
    securityContext: {}
    nodeSelector:
      kubernetes.io/hostname: prusik
  service:
    dashboard:
      ports:
        http:
          port: 9119
  ingress:
    dashboard:
      enabled: true
      className: nginx-internal
      annotations:
        external-dns.alpha.kubernetes.io/enabled: "true"
        cert-manager.io/cluster-issuer: letsencrypt-prod-dns
        nginx.ingress.kubernetes.io/auth-url: https://auth.grigri.cloud/oauth2/auth?allowed_groups=hermes-users@idm.grigri.cloud
        nginx.ingress.kubernetes.io/auth-signin: https://auth.grigri.cloud/oauth2/start
        nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
      hosts:
        - host: hermes.internal.grigri.cloud
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: dashboard
                port: http
      tls:
        - hosts:
            - hermes.internal.grigri.cloud
          secretName: hermes-dashboard-tls-certificate
  persistence:
    data:
      enabled: true
      globalMounts:
        - path: /opt/data
      existingClaim: hermes-data
