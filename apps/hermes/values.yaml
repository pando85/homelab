app-template:
  controllers:
    hermes:
      labels:
        backup/retain: quaterly
      type: statefulset
      pod:
        enableServiceLinks: false
        runtimeClassName: kata
        automountServiceAccountToken: false
      serviceAccount:
        name: hermes-agent
      initContainers:
        fix-sa-token:
          image:
            repository: public.ecr.aws/docker/library/busybox
            tag: "1.38"
          command:
            - sh
            - -c
          args:
            - mkdir -p /shared/serviceaccount && cp -L /var/run/secrets/kubernetes.io/serviceaccount/* /shared/serviceaccount/ && find /shared/serviceaccount -type d -exec chmod 0755 {} \; && find /shared/serviceaccount -type f -exec chmod 0644 {} \;
      containers:
        hermes:
          image:
            # renovate: datasource=docker depName=nousresearch/hermes-agent
            repository: nousresearch/hermes-agent
            tag: v2026.5.29.2
          args: ["gateway", "run"]
          securityContext:
            runAsUser: 0
          env:
            TZ: Europe/Madrid
            HERMES_DASHBOARD: "1"
            HERMES_DASHBOARD_INSECURE: "1"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "8"
              memory: 4Gi
  defaultPodOptions:
    securityContext: {}
    nodeSelector:
      kubernetes.io/hostname: prusik
  service:
    dashboard:
      ports:
        http:
          port: 9119
  ingress:
    dashboard:
      enabled: true
      className: nginx-internal
      annotations:
        external-dns.alpha.kubernetes.io/enabled: "true"
        cert-manager.io/cluster-issuer: letsencrypt-prod-dns
        nginx.ingress.kubernetes.io/auth-url: https://auth.grigri.cloud/oauth2/auth?allowed_groups=hermes-users@idm.grigri.cloud
        nginx.ingress.kubernetes.io/auth-signin: https://auth.grigri.cloud/oauth2/start
        nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
      hosts:
        - host: hermes.internal.grigri.cloud
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: dashboard
                port: http
      tls:
        - hosts:
            - hermes.internal.grigri.cloud
          secretName: hermes-dashboard-tls-certificate
  persistence:
    data:
      enabled: true
      globalMounts:
        - path: /opt/data
      existingClaim: hermes-data
    sa-token-source:
      type: custom
      volumeSpec:
        projected:
          defaultMode: 0644
          sources:
            - serviceAccountToken:
                path: token
                audience: https://kubernetes.default.svc.cluster.local
                expirationSeconds: 7776000
            - configMap:
                name: kube-root-ca.crt
                items:
                  - key: ca.crt
                    path: ca.crt
            - downwardAPI:
                items:
                  - fieldRef:
                      fieldPath: metadata.namespace
                    path: namespace
      advancedMounts:
        hermes:
          fix-sa-token:
            - path: /var/run/secrets/kubernetes.io/serviceaccount
              readOnly: true
    sa-token:
      type: emptyDir
      advancedMounts:
        hermes:
          fix-sa-token:
            - path: /shared/serviceaccount
          hermes:
            - path: /var/run/secrets/hermes-k8s
              readOnly: true
