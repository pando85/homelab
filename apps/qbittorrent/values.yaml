app-template:
  controllers:
    qbittorrent:
      labels:
        backup/retain: quaterly
      replicas: 1
      type: statefulset
      containers:
        qbittorrent:
          image:
            repository: ghcr.io/home-operations/qbittorrent
            tag: 5.2.0@sha256:788796013c3da75f2dba568c5319975a5c41f555586dfd13987be4631181e00e

          env:
            UMASK: "022"
            QBT_TORRENTING_PORT: &torrent_port 50413
            QBT_WEBUI_PORT: &port 8080

          resources:
            requests:
              cpu: 100m
              memory: 800Mi
            limits:
              memory: 10Gi
              cpu: "2"

          probes:
            liveness: &probe
              enabled: true
              custom: true
              spec:
                failureThreshold: 3
                periodSeconds: 10
                tcpSocket:
                  port: *port
                timeoutSeconds: 1
            startup:
              enabled: true
              custom: true
              spec:
                tcpSocket:
                  port: *port
                failureThreshold: 30
                periodSeconds: 10
            readiness: *probe
        metrics:
          image:
            repository: ghcr.io/esanchezm/prometheus-qbittorrent-exporter
            tag: latest@sha256:22bfda2c06fb4a65215de95e25288df97199424f44298b78dbfdfd82d34349b8
          env:
            QBITTORRENT_HOST: localhost
            QBITTORRENT_PORT: *port
          resources:
            requests:
              cpu: 15m
              memory: 32Mi
            limits:
              memory: 100Mi

          ports:
            - name: metrics
              containerPort: &metrics_port 8000
              protocol: TCP

          probes:
            liveness: &metrics_probe
              enabled: true
              custom: true
              spec:
                failureThreshold: 3
                periodSeconds: 30
                tcpSocket:
                  port: *metrics_port
                timeoutSeconds: 1
            readiness: *metrics_probe

      initContainers:
        config-patch:
          image:
            repository: busybox
            tag: 1.37
          command:
            - sh
            - -c
            - |
              CONFIG_FILE=/config/qBittorrent/qBittorrent.conf
              rm -f /config/qBittorrent/lockfile
              if [ -f "$CONFIG_FILE" ]; then
                sed -i 's/^MemoryWorkingSetLimit=.*/MemoryWorkingSetLimit=9000/' "$CONFIG_FILE"
                sed -i 's/^Session\\MaxConnections=.*/Session\\MaxConnections=8000/' "$CONFIG_FILE"
                sed -i 's/^Session\\MaxConnectionsPerTorrent=.*/Session\\MaxConnectionsPerTorrent=25/' "$CONFIG_FILE"
                sed -i 's/^Session\\MaxActiveTorrents=.*/Session\\MaxActiveTorrents=1200/' "$CONFIG_FILE"
                sed -i 's/^Session\\MaxActiveUploads=.*/Session\\MaxActiveUploads=1000/' "$CONFIG_FILE"
                sed -i 's/^Session\\MaxUploads=.*/Session\\MaxUploads=100/' "$CONFIG_FILE"
                sed -i 's/^Session\\MaxUploadsPerTorrent=.*/Session\\MaxUploadsPerTorrent=6/' "$CONFIG_FILE"
                sed -i 's/^Session\\MaxConcurrentHTTPAnnounces=.*/Session\\MaxConcurrentHTTPAnnounces=10/' "$CONFIG_FILE"
                sed -i 's/^Session\\RequestQueueSize=.*/Session\\RequestQueueSize=200/' "$CONFIG_FILE"
                sed -i 's/^Session\\GlobalUPSpeedLimit=.*/Session\\GlobalUPSpeedLimit=5000/' "$CONFIG_FILE"
                sed -i 's/^Session\\GlobalDLSpeedLimit=.*/Session\\GlobalDLSpeedLimit=8000/' "$CONFIG_FILE"
                sed -i 's/^Session\\PeerTurnover=.*/Session\\PeerTurnover=4/' "$CONFIG_FILE"
                sed -i 's/^Session\\SendBufferWatermark=.*/Session\\SendBufferWatermark=512/' "$CONFIG_FILE"
                sed -i 's/^Session\\ConnectionSpeed=.*/Session\\ConnectionSpeed=30/' "$CONFIG_FILE"
                sed -i 's/^Session\\PeerTurnoverInterval=.*/Session\\PeerTurnoverInterval=300/' "$CONFIG_FILE"
                sed -i 's/^Session\\PeerTurnoverCutoff=.*/Session\\PeerTurnoverCutoff=90/' "$CONFIG_FILE"
                sed -i 's/^Session\\SocketBacklogSize=.*/Session\\SocketBacklogSize=30/' "$CONFIG_FILE"
              fi

  defaultPodOptions:
    securityContext:
      runAsUser: 995
      runAsGroup: 501
      fsGroup: 501
      fsGroupChangePolicy: "OnRootMismatch"

    hostname: qbittorrent

    # uncomment after restore:
    #nodeSelector:
    #  kubernetes.io/hostname: prusik

  service:
    qbittorrent:
      controller: qbittorrent
      ports:
        http:
          port: *port
        metrics:
          port: *metrics_port

    bittorrent:
      controller: qbittorrent
      type: LoadBalancer
      annotations:
        lbipam.cilium.io/ips: "192.168.193.7"
        external-dns.alpha.kubernetes.io/enabled: "true"
      externalTrafficPolicy: Local
      ports:
        bittorrent:
          enabled: true
          port: *torrent_port
          protocol: TCP
          targetPort: *torrent_port

  serviceMonitor:
    qbittorrent:
      enabled: true
      serviceName: qbittorrent
      labels:
        release: monitoring
      endpoints:
        - port: metrics
          scheme: http
          path: /metrics
          interval: 1m
          scrapeTimeout: 30s

  ingress:
    qbittorrent:
      enabled: true
      className: nginx-internal
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod-dns
        external-dns.alpha.kubernetes.io/enabled: "true"
      hosts:
        - host: &host qbittorrent.internal.grigri.cloud
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: qbittorrent
                port: http
      tls:
        - hosts:
            - *host
          secretName: qbittorrent-tls-certificate

    external:
      enabled: true
      className: nginx-external
      annotations:
        external-dns.alpha.kubernetes.io/enabled: "true"
        external-dns.alpha.kubernetes.io/target: grigri.cloud
        cert-manager.io/cluster-issuer: letsencrypt-prod-dns
        nginx.ingress.kubernetes.io/auth-url: https://auth.grigri.cloud/oauth2/auth?allowed_groups=qbittorrent-users@idm.grigri.cloud
        nginx.ingress.kubernetes.io/auth-signin: https://auth.grigri.cloud/oauth2/start
        nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
      hosts:
        - host: &host qbittorrent.grigri.cloud
          paths:
            - path: /
              service:
                identifier: qbittorrent
                port: http
      tls:
        - hosts:
            - *host
          secretName: qbittorrent-external-tls-certificate

  persistence:
    config:
      enabled: true
      globalMounts:
        - path: /config
      existingClaim: config-qbittorrent

    series:
      enabled: true
      type: hostPath
      hostPath: /datasets/series/download
      globalMounts:
        - path: /datasets/series/download

    peliculas:
      enabled: true
      type: hostPath
      hostPath: /datasets/peliculas/download
      globalMounts:
        - path: /datasets/peliculas/download

    musica:
      enabled: true
      type: hostPath
      hostPath: /datasets/musica/download
      globalMounts:
        - path: /datasets/musica/download
