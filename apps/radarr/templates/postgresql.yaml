apiVersion: "acid.zalan.do/v1"
kind: postgresql
metadata:
  name: radarr-postgres
  labels:
    backup/retain: weekly
spec:
  teamId: radarr

  numberOfInstances: 1

  resources:
    requests:
      cpu: 10m
      memory: 128Mi
    limits:
      memory: 512Mi

  volume:
    size: 2Gi

  users:
    radarr:
      - superuser
      - createdb
  databases:
    radarr-main: radarr
    radarr-log: radarr

  postgresql:
    version: "17"
    parameters:
      archive_mode: "off"
      max_connections: "25"
      shared_buffers: 128MB
      log_checkpoints: "off"
      log_connections: "off"
      log_disconnections: "off"
      log_lock_waits: "off"
      log_min_duration_statement: "-1"
      log_statement: none
      full_page_writes: "off"
