---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cross-backups-users
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault
  target:
    name: cross-backups-users
  data:
    - secretKey: rootUser
      remoteRef:
        key: /cross-backup/users
        property: rootUser
    - secretKey: rootPassword
      remoteRef:
        key: /cross-backup/users
        property: rootPassword
    - secretKey: millaPassword
      remoteRef:
        key: /cross-backup/users
        property: millaPassword
    - secretKey: dabolPassword
      remoteRef:
        key: /cross-backup/users
        property: dabolPassword
    - secretKey: sdelrioPassword
      remoteRef:
        key: /cross-backup/users
        property: sdelrioPassword
    - secretKey: nbg1C01VeleroPassword
      remoteRef:
        key: /cross-backup/users
        property: nbg1C01VeleroPassword
    - secretKey: nbg1C01PostgresBackupsPassword
      remoteRef:
        key: /cross-backup/users
        property: nbg1C01PostgresBackupsPassword
    - secretKey: nbg1C01VaultBackupsPassword
      remoteRef:
        key: /cross-backup/users
        property: nbg1C01VaultBackupsPassword
